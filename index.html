<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올스타즈 이모저모</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --border: #2e2e40;
    --accent: #ffd93d;
    --text: #f0f0f8;
    --text2: #7777aa;
    --text3: #3d3d58;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; }

  body { display: flex; flex-direction: column; min-height: 100dvh; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 10% 10%, rgba(255,217,61,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 90%, rgba(100,100,200,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 1;
    padding: 64px 40px 40px;
    border-bottom: 1px solid var(--border);
  }
  .header-inner { max-width: 960px; margin: 0 auto; }

  .site-eyebrow {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  .site-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1.5px;
    opacity: 0;
    animation: fadeUp 0.6s 0.1s ease forwards;
  }
  .site-title em { font-style: normal; color: var(--accent); }

  .site-desc {
    margin-top: 16px;
    font-size: 14px;
    color: var(--text2);
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s ease forwards;
  }

  /* ── MAIN ── */
  main { flex: 1; position: relative; z-index: 1; padding: 48px 40px; }
  .grid-wrap { max-width: 960px; margin: 0 auto; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.6s 0.3s ease forwards;
  }

  /* ── TOOL GRID ── */
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  /* ── TOOL CARD ── */
  .tool-card {
    aspect-ratio: 1 / 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 22px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
    transition: border-color 0.22s, transform 0.22s, box-shadow 0.22s;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }

  .tool-card:nth-child(1) { animation-delay: 0.35s; }
  .tool-card:nth-child(2) { animation-delay: 0.45s; }
  .tool-card:nth-child(3) { animation-delay: 0.55s; }
  .tool-card:nth-child(4) { animation-delay: 0.65s; }
  .tool-card:nth-child(5) { animation-delay: 0.75s; }
  .tool-card:nth-child(6) { animation-delay: 0.85s; }

  .tool-card::before {
    content: '';
    position: absolute;
    top: -30%; right: -20%;
    width: 70%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: var(--card-color, var(--accent));
    opacity: 0.06;
    transition: opacity 0.3s, transform 0.3s;
  }

  .tool-card:hover {
    border-color: var(--card-color, var(--accent));
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 0 1px var(--card-color, var(--accent));
  }
  .tool-card:hover::before { opacity: 0.14; transform: scale(1.2); }

  .card-icon {
    font-size: 36px;
    position: absolute;
    top: 22px; left: 22px;
    line-height: 1;
    transition: transform 0.3s;
  }
  .tool-card:hover .card-icon { transform: scale(1.12) rotate(-4deg); }

  .card-badge {
    position: absolute;
    top: 18px; right: 18px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--card-color, var(--accent));
    color: #fff;
    opacity: 0.85;
  }

  .card-name {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text2);
    font-weight: 300;
    line-height: 1.5;
    position: relative;
    z-index: 1;
  }

  /* 준비 중 카드 */
  .tool-card.coming-soon { cursor: default; }
  .tool-card.coming-soon:hover { transform: none; box-shadow: none; border-color: var(--border); }
  .tool-card.coming-soon .card-icon,
  .tool-card.coming-soon .card-name,
  .tool-card.coming-soon .card-desc { opacity: 0.3; }
  .tool-card.coming-soon .card-badge { background: var(--text3); opacity: 1; }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 24px 40px;
  }
  .footer-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .footer-logo {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text3);
  }
  .footer-id { font-size: 12px; color: var(--text2); }
  .footer-id a { color: var(--text2); text-decoration: none; transition: color 0.15s; }
  .footer-id a:hover { color: var(--accent); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── GACHA BANNER ── */
  .gacha-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--accent);
    border-radius: 16px;
    padding: 24px 32px;
    margin-bottom: 16px;
    text-decoration: none;
    color: #111;
    position: relative;
    overflow: hidden;
    transition: filter 0.2s, transform 0.2s, box-shadow 0.2s;
    opacity: 0;
    animation: fadeUp 0.5s 0.3s ease forwards;
  }
  .gacha-banner::before {
    content: '';
    position: absolute;
    right: -40px; top: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(0,0,0,0.06);
    pointer-events: none;
  }
  .gacha-banner::after {
    content: '';
    position: absolute;
    right: 60px; bottom: -80px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(0,0,0,0.04);
    pointer-events: none;
  }
  .gacha-banner:hover {
    filter: brightness(1.06);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(255,217,61,0.25);
  }
  .gacha-left {
    display: flex;
    align-items: baseline;
    gap: 12px;
    position: relative;
    z-index: 1;
  }
  .gacha-eyebrow {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 3px;
    opacity: 0.6;
  }
  .gacha-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .gacha-sub {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 400;
    opacity: 0.55;
  }
  .gacha-arrow {
    position: relative;
    z-index: 1;
    width: 40px; height: 40px;
    background: rgba(0,0,0,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.2s;
  }
  .gacha-banner:hover .gacha-arrow {
    background: rgba(0,0,0,0.18);
    transform: translateX(3px);
  }
  .gacha-arrow svg { width: 18px; height: 18px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header { padding: 40px 20px 28px; }
    main { padding: 32px 20px; }
    footer { padding: 20px; }
    .gacha-banner { padding: 18px 20px; border-radius: 12px; }
    .gacha-eyebrow { display: none; }
    .gacha-title { font-size: 22px; }
    .gacha-sub { font-size: 12px; }
    .gacha-arrow { width: 34px; height: 34px; }
    .tool-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .tool-card { padding: 16px; border-radius: 12px; }
    .card-icon { font-size: 26px; top: 14px; left: 14px; }
    .card-name { font-size: 16px; }
    .card-desc { font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-eyebrow">ALLSTARS</div>
    <h1 class="site-title">올스타즈<br><em>이모저모</em></h1>
    <p class="site-desc">올스타즈 컨텐츠 ZIP</p>
  </div>
</header>

<main>
  <div class="grid-wrap">
    <div class="section-label">툴 목록</div>

    <!-- 가챠 배너 -->
    <a class="gacha-banner" href="https://allstars-gacha.web.app/" target="_blank" rel="noopener">
      <div class="gacha-left">
        <span class="gacha-eyebrow">ALLSTARS</span>
        <span class="gacha-title">GACHA</span>
        <span class="gacha-sub">가챠게임</span>
      </div>
      <div class="gacha-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </a>

    <div class="tool-grid">

      <!-- 올짤에디터 -->
      <a class="tool-card" href="imagegenerator.html" style="--card-color:#ff6b6b">
        <span class="card-icon">🖼️</span>
        <div class="card-name">올짤에디터</div>
        <div class="card-desc">사진에 만능대가리 붙이기</div>
      </a>

      <!-- 올실루엣 퀴즈 -->
      <a class="tool-card" href="silhouettequiz.html" style="--card-color:#ffd93d">
        <span class="card-icon">🕵️</span>
        <div class="card-name">올실루엣 퀴즈</div>
        <div class="card-desc">실루엣만 보고 캐릭터 맞추기</div>
      </a>

      <!-- 준비 중 슬롯 -->
      <div class="tool-card coming-soon" style="--card-color:#6bcb77">
        <span class="card-icon">✦</span>
        <span class="card-badge">SOON</span>
        <div class="card-name">준비 중</div>
        <div class="card-desc">곧 추가될 예정</div>
      </div>

      <div class="tool-card coming-soon" style="--card-color:#74b9ff">
        <span class="card-icon">✦</span>
        <span class="card-badge">SOON</span>
        <div class="card-name">준비 중</div>
        <div class="card-desc">곧 추가될 예정</div>
      </div>

    </div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <span class="footer-logo">올스타즈 이모저모</span>
    <span class="footer-id"><a href="https://twitter.com/austock21" target="_blank" rel="noopener">@austock21</a></span>
  </div>
</footer>

</body>
</html>
