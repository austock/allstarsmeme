<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>올짤에디터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --surface3: #2a2a38;
    --border: #32324a;
    --accent: #ff6b6b;
    --text: #f0f0f8;
    --text2: #9999bb;
    --text3: #55556a;
    --panel-w: 300px;
    --topbar-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  #topbar {
    height: var(--topbar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 100;
  }
  #topbar .logo {
    font-family: 'Gmarket Sans', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-right: 8px;
    white-space: nowrap;
  }
  .tb-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: var(--surface3); border-color: var(--accent); }
  .tb-btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .tb-btn.accent:hover { opacity: 0.88; }
  .tb-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
  .tb-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .tb-spacer { flex: 1; }
  #canvas-size-info { font-size: 11px; color: var(--text3); white-space: nowrap; }

  /* ── MAIN LAYOUT ── */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* ── CANVAS AREA — 스크롤 가능 ── */
  #canvas-wrap {
    flex: 1;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 50%, rgba(255,107,107,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(107,203,119,0.03) 0%, transparent 50%);
    overflow: auto;
    padding: 24px;
    /* 캔버스가 작을 땐 중앙 정렬 */
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }
  /* 캔버스가 영역보다 작으면 중앙에 */
  #canvas-outer {
    min-width: 100%;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #canvas-container {
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 0 0 1px var(--border), 0 24px 80px rgba(0,0,0,0.6);
  }
  #canvas-container canvas { display: block; }

  /* ── RIGHT PANEL ── */
  #right-panel {
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .panel-section { border-bottom: 1px solid var(--border); }
  .panel-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 14px 16px 10px;
  }

  /* ── 만능대가리 PANEL ── */
  #sticker-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #cat-tabs {
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  #cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .cat-tab:hover { border-color: var(--accent); color: var(--text); }
  .cat-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  #sticker-grid {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    align-content: start;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .sticker-item {
    aspect-ratio: 1;
    border-radius: 8px;
    border: 2px solid transparent;
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: all 0.15s;
    padding: 4px;
  }
  .sticker-item:hover { border-color: var(--accent); background: var(--surface3); transform: scale(1.06); }
  .sticker-item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

  /* ── OBJECT CONTROLS ── */
  #obj-controls { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  #obj-controls.hidden { display: none; }
  .ctrl-row { display: flex; align-items: center; gap: 8px; }
  .ctrl-label { font-size: 11px; color: var(--text3); width: 44px; flex-shrink: 0; }
  .ctrl-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  .ctrl-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .ctrl-val { font-size: 11px; color: var(--text2); width: 30px; text-align: right; }
  .ctrl-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .ctrl-btn {
    flex: 1;
    min-width: 60px;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--text); }
  .ctrl-btn.danger:hover { border-color: #ff4444; color: #ff4444; }

  /* ── IMAGE SOURCE ── */
  #img-source { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .url-row { display: flex; gap: 6px; }
  .url-input {
    flex: 1;
    padding: 7px 10px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--text3); }
  #drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text3);
    font-size: 12px;
  }
  #drop-zone:hover, #drop-zone.drag-over { border-color: var(--accent); color: var(--accent); background: rgba(255,107,107,0.05); }
  #drop-zone .dz-icon { font-size: 28px; margin-bottom: 6px; }

  /* ── MOBILE BOTTOM SHEET ── */
  #mobile-sticker-sheet {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 65dvh;
    flex-direction: column;
  }
  #mobile-sticker-sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 8px;
    flex-shrink: 0;
    cursor: pointer;
  }

  /* ── MOBILE BOTTOM BAR ── */
  #mobile-bar {
    display: none;
    height: 60px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    align-items: stretch;
  }
  .mbar-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 10px;
    font-family: inherit;
    cursor: pointer;
    transition: color 0.15s;
    padding: 0;
  }
  .mbar-btn:hover { color: var(--accent); }
  .mbar-btn svg { width: 20px; height: 20px; }

  #file-input { display: none; }

  /* ── OVERLAY ── */
  #start-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
  }
  #start-overlay.hidden { display: none; }
  .ov-title { font-family: 'Gmarket Sans', sans-serif; font-size: 22px; font-weight: 700; color: var(--text3); }
  .ov-sub { font-size: 13px; color: var(--text3); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface3);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    border: 1px solid var(--border);
    opacity: 0;
    transition: all 0.25s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    :root { --panel-w: 0px; }
    #right-panel { display: none; }
    #mobile-bar { display: flex; }
    #mobile-sticker-sheet { display: flex; }
    #canvas-wrap { padding: 12px; }
    #canvas-size-info { display: none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="logo">✦ 올짤에디터</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-upload-top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    사진 올리기
  </button>
  <span id="canvas-size-info">—</span>
  <div class="tb-spacer"></div>
  <button class="tb-btn" id="btn-undo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
    되돌리기
  </button>
  <button class="tb-btn accent" id="btn-download">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    다운로드
  </button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- CANVAS (스크롤 가능) -->
  <div id="canvas-wrap">
    <div id="canvas-outer">
      <div id="canvas-container">
        <canvas id="c"></canvas>
        <div id="start-overlay">
          <div class="ov-title">📸 사진을 올려주세요</div>
          <div class="ov-sub">우측 패널에서 업로드하거나 여기에 드래그해도 돼요</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL (데스크탑) -->
  <div id="right-panel">

    <!-- 이미지 업로드 -->
    <div class="panel-section">
      <div class="panel-title">이미지</div>
      <div id="img-source">
        <div id="drop-zone">
          <div class="dz-icon">🖼️</div>
          <div>클릭하거나 드래그해서 올리기</div>
        </div>
        <div class="url-row">
          <input class="url-input" id="url-input" type="text" placeholder="이미지 URL 붙여넣기">
          <button class="tb-btn" id="btn-url-load" style="padding:7px 10px;font-size:12px;">확인</button>
        </div>
      </div>
    </div>

    <!-- 만능대가리 컨트롤 -->
    <div class="panel-section">
      <div class="panel-title">선택된 만능대가리</div>
      <div id="obj-controls" class="hidden">
        <div class="ctrl-row">
          <span class="ctrl-label">크기</span>
          <input type="range" class="ctrl-slider" id="sl-scale" min="10" max="300" value="100">
          <span class="ctrl-val" id="val-scale">100%</span>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">회전</span>
          <input type="range" class="ctrl-slider" id="sl-rotate" min="0" max="360" value="0">
          <span class="ctrl-val" id="val-rotate">0°</span>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">투명도</span>
          <input type="range" class="ctrl-slider" id="sl-opacity" min="0" max="100" value="100">
          <span class="ctrl-val" id="val-opacity">100%</span>
        </div>
        <div class="ctrl-btns">
          <button class="ctrl-btn" id="btn-flip-h">↔ 좌우반전</button>
          <button class="ctrl-btn" id="btn-flip-v">↕ 상하반전</button>
          <button class="ctrl-btn" id="btn-bring-front">앞으로</button>
          <button class="ctrl-btn" id="btn-send-back">뒤로</button>
          <button class="ctrl-btn danger" id="btn-delete">🗑 삭제</button>
        </div>
      </div>
      <div id="obj-empty" style="padding:12px 16px;font-size:12px;color:var(--text3);">
        만능대가리를 클릭하면 조절할 수 있어요
      </div>
    </div>

    <!-- 만능대가리 목록 -->
    <div id="sticker-section">
      <div class="panel-title">만능대가리</div>
      <div id="cat-tabs"></div>
      <div id="sticker-grid"></div>
    </div>

  </div>
</div>

<!-- MOBILE BOTTOM BAR -->
<div id="mobile-bar">
  <button class="mbar-btn" id="mb-upload">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    사진
  </button>
  <button class="mbar-btn" id="mb-stickers">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
    만능대가리
  </button>
  <button class="mbar-btn" id="mb-edit">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    편집
  </button>
  <button class="mbar-btn" id="mb-download" style="color:var(--accent)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    저장
  </button>
</div>

<!-- MOBILE 만능대가리 SHEET -->
<div id="mobile-sticker-sheet">
  <div class="sheet-handle" id="sheet-handle"></div>
  <div style="padding:0 12px 6px">
    <div id="cat-tabs-m" style="display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:4px 0"></div>
  </div>
  <div id="sticker-grid-m" style="flex:1;overflow-y:auto;padding:8px 12px 24px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-content:start"></div>
</div>

<!-- MOBILE EDIT SHEET -->
<div id="mobile-edit-sheet" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:20px 20px 0 0;z-index:200;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);padding:16px 20px 32px;flex-direction:column;gap:12px;">
  <div class="sheet-handle" id="edit-sheet-handle" style="margin:0 auto 12px;"></div>
  <div class="ctrl-row">
    <span class="ctrl-label">크기</span>
    <input type="range" class="ctrl-slider" id="sl-scale-m" min="10" max="300" value="100">
    <span class="ctrl-val" id="val-scale-m">100%</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">회전</span>
    <input type="range" class="ctrl-slider" id="sl-rotate-m" min="0" max="360" value="0">
    <span class="ctrl-val" id="val-rotate-m">0°</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">투명도</span>
    <input type="range" class="ctrl-slider" id="sl-opacity-m" min="0" max="100" value="100">
    <span class="ctrl-val" id="val-opacity-m">100%</span>
  </div>
  <div class="ctrl-btns">
    <button class="ctrl-btn" id="btn-flip-h-m">↔ 좌우반전</button>
    <button class="ctrl-btn" id="btn-flip-v-m">↕ 상하반전</button>
    <button class="ctrl-btn" id="btn-bring-front-m">앞으로</button>
    <button class="ctrl-btn" id="btn-send-back-m">뒤로</button>
    <button class="ctrl-btn danger" id="btn-delete-m">🗑 삭제</button>
  </div>
</div>

<input type="file" id="file-input" accept="image/*">
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  MANIFEST 로드 (img/manifest.json)
//  없으면 데모 샘플로 폴백
// ══════════════════════════════════════════════
let MANIFEST = { categories: [] };

async function loadManifest() {
  try {
    const res = await fetch('./img/manifest.json');
    if (!res.ok) throw new Error(`HTTP ${res.status} — img/manifest.json 응답 오류`);
    const data = await res.json();

    // 카테고리가 비어있거나 stickers 경로가 잘못된 경우 경고
    if (!data.categories || data.categories.length === 0) {
      throw new Error('manifest.json에 categories가 없습니다');
    }

    // stickers 경로가 img/ 로 시작하는지 검증 (잘못된 manifest 감지)
    const firstSticker = data.categories[0]?.stickers?.[0] ?? '';
    if (firstSticker && !firstSticker.startsWith('img/')) {
      console.warn(
        `⚠️ manifest.json의 스티커 경로가 "img/"로 시작하지 않습니다: "${firstSticker}"\n` +
        `generate-manifest.js를 실행해서 img/manifest.json을 다시 생성해주세요.`
      );
      // 경로 자동 보정 시도: "stickers/..." → "img/..."  또는 단순 파일명 → "img/카테고리/파일명"
      data.categories = data.categories.map(cat => ({
        ...cat,
        stickers: cat.stickers.map(s => {
          if (s.startsWith('img/') || s.startsWith('http')) return s;
          // "stickers/xxx/yyy.png" 형식 보정
          if (s.startsWith('stickers/')) return s.replace(/^stickers\//, 'img/');
          return s;
        })
      }));
    }

    MANIFEST = data;
    const total = MANIFEST.categories.reduce((n, c) => n + c.stickers.length, 0);
    console.log(`✅ manifest 로드 완료 — 카테고리 ${MANIFEST.categories.length}개, 만능대가리 ${total}개`);

  } catch (err) {
    console.warn('❌ img/manifest.json 로드 실패 → 데모 샘플 사용\n원인:', err.message);
    MANIFEST = {
      categories: [{
        id: 'demo', label: '데모샘플',
        stickers: [
          'https://em-content.zobj.net/source/apple/391/grinning-face_1f600.png',
          'https://em-content.zobj.net/source/apple/391/face-with-tears-of-joy_1f602.png',
          'https://em-content.zobj.net/source/apple/391/smiling-face-with-heart-eyes_1f60d.png',
          'https://em-content.zobj.net/source/apple/391/star-struck_1f929.png',
          'https://em-content.zobj.net/source/apple/391/fire_1f525.png',
          'https://em-content.zobj.net/source/apple/391/sparkles_2728.png',
          'https://em-content.zobj.net/source/apple/391/red-heart_2764-fe0f.png',
          'https://em-content.zobj.net/source/apple/391/star_2b50.png',
        ]
      }]
    };
  }
  buildStickerUI(document.getElementById('cat-tabs'), document.getElementById('sticker-grid'));
  buildStickerUI(document.getElementById('cat-tabs-m'), document.getElementById('sticker-grid-m'));
}

// ══════════════════════════════════════════════
//  CANVAS SETUP
//  배경 이미지의 원본 비율을 그대로 캔버스 크기로 사용.
//  한 변이 MAX_DIM 초과 시 비율 유지하며 축소.
//  화면보다 크면 displayScale로 축소 표시 + 스크롤.
// ══════════════════════════════════════════════
const MAX_DIM = 4000;      // 캔버스 한 변 최대 픽셀

let canvasW = 800;
let canvasH = 600;
let displayScale = 1;

const canvas = new fabric.Canvas('c', {
  backgroundColor: '#ffffff',
  selection: true,
  preserveObjectStacking: true,
});

function applyDisplayScale() {
  const wrap   = document.getElementById('canvas-wrap');
  const topbar = document.getElementById('topbar');
  const mbar   = document.getElementById('mobile-bar');
  const isMobile = window.innerWidth <= 768;

  const availW = wrap.clientWidth  - 48;
  const availH = window.innerHeight - topbar.offsetHeight - (isMobile ? mbar.offsetHeight : 0) - 48;

  // 화면보다 크면 축소, 작으면 1:1 (확대 안 함)
  displayScale = Math.min(availW / canvasW, availH / canvasH, 1);
  displayScale = Math.max(displayScale, 0.05);

  canvas.setDimensions({
    width:  Math.round(canvasW * displayScale),
    height: Math.round(canvasH * displayScale),
  });
  canvas.setZoom(displayScale);
  canvas.renderAll();

  document.getElementById('canvas-size-info').textContent = `${canvasW} × ${canvasH}px`;
}

window.addEventListener('resize', applyDisplayScale);

// ══════════════════════════════════════════════
//  HISTORY (Undo)
// ══════════════════════════════════════════════
let history = [];
let isUndoing = false;

function saveHistory() {
  if (isUndoing) return;
  history.push(JSON.stringify(canvas));
  if (history.length > 30) history.shift();
}
canvas.on('object:added',    saveHistory);
canvas.on('object:modified', saveHistory);
canvas.on('object:removed',  saveHistory);

document.getElementById('btn-undo').addEventListener('click', () => {
  if (history.length < 2) { showToast('더 이상 되돌릴 수 없어요'); return; }
  isUndoing = true;
  history.pop();
  canvas.loadFromJSON(history[history.length - 1], () => {
    canvas.renderAll();
    isUndoing = false;
  });
});

// ══════════════════════════════════════════════
//  IMAGE UPLOAD — 원본 비율 그대로 캔버스 크기 결정
// ══════════════════════════════════════════════
function loadImageToCanvas(src) {
  fabric.Image.fromURL(src, img => {
    if (!img?.width) { showToast('이미지를 불러올 수 없어요'); return; }

    let w = img.width;
    let h = img.height;

    // 너무 큰 이미지 방어
    if (w > MAX_DIM || h > MAX_DIM) {
      const r = Math.min(MAX_DIM / w, MAX_DIM / h);
      w = Math.round(w * r);
      h = Math.round(h * r);
    }

    canvasW = w;
    canvasH = h;

    // 기존 배경 제거
    canvas.getObjects().filter(o => o._isBackground).forEach(o => canvas.remove(o));

    // 배경 이미지: 캔버스와 1:1 매핑
    img.set({
      scaleX: w / img.width,
      scaleY: h / img.height,
      left: 0,
      top: 0,
      selectable: false,
      evented: false,
      _isBackground: true,
    });
    canvas.add(img);
    canvas.sendToBack(img);

    applyDisplayScale();
    document.getElementById('start-overlay').classList.add('hidden');
    showToast('이미지를 불러왔어요 ✓');
  }, { crossOrigin: 'anonymous' });
}

// 파일 업로드
const fileInput = document.getElementById('file-input');
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadImageToCanvas(ev.target.result);
  reader.readAsDataURL(file);
  fileInput.value = '';
});
document.getElementById('btn-upload-top').addEventListener('click', () => fileInput.click());

// 드롭존 (패널)
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file?.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => loadImageToCanvas(ev.target.result);
    reader.readAsDataURL(file);
  }
});

// 캔버스 영역 드롭
const canvasWrapEl = document.getElementById('canvas-wrap');
canvasWrapEl.addEventListener('dragover', e => e.preventDefault());
canvasWrapEl.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file?.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => loadImageToCanvas(ev.target.result);
    reader.readAsDataURL(file);
  }
});

// URL 로드
document.getElementById('btn-url-load').addEventListener('click', () => {
  const url = document.getElementById('url-input').value.trim();
  if (url) loadImageToCanvas(url);
});
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-url-load').click();
});

// ══════════════════════════════════════════════
//  만능대가리 그리드
// ══════════════════════════════════════════════
function buildStickerUI(tabsEl, gridEl) {
  tabsEl.innerHTML = '';
  MANIFEST.categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (i === 0 ? ' active' : '');
    btn.textContent = cat.label;
    btn.addEventListener('click', () => {
      tabsEl.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(gridEl, cat.stickers);
    });
    tabsEl.appendChild(btn);
  });
  if (MANIFEST.categories.length > 0) renderGrid(gridEl, MANIFEST.categories[0].stickers);
}

function renderGrid(gridEl, stickers) {
  gridEl.innerHTML = '';
  stickers.forEach(src => {
    const item = document.createElement('div');
    item.className = 'sticker-item';
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    img.alt = '';
    img.onerror = () => {
      item.title = `로드 실패: ${src}`;
      item.style.opacity = '0.3';
      img.style.display = 'none';
      const warn = document.createElement('span');
      warn.textContent = '⚠️';
      warn.style.fontSize = '18px';
      item.appendChild(warn);
      console.warn('스티커 로드 실패:', src);
    };
    item.appendChild(img);
    item.addEventListener('click', () => addSticker(src));
    gridEl.appendChild(item);
  });
}

function addSticker(src) {
  fabric.Image.fromURL(src, img => {
    const maxDim = Math.min(canvasW, canvasH) * 0.25;
    const s = maxDim / Math.max(img.width, img.height);
    img.set({
      scaleX: s, scaleY: s,
      left: canvasW / 2, top: canvasH / 2,
      originX: 'center', originY: 'center',
    });
    canvas.add(img);
    canvas.setActiveObject(img);
    canvas.renderAll();
    showToast('만능대가리 추가! ✓');
    closeMobileSheets();
  }, { crossOrigin: 'anonymous' });
}

// ══════════════════════════════════════════════
//  OBJECT CONTROLS
// ══════════════════════════════════════════════
let selectedObj = null;

canvas.on('selection:created', updateControls);
canvas.on('selection:updated', updateControls);
canvas.on('selection:cleared', () => {
  selectedObj = null;
  document.getElementById('obj-controls').classList.add('hidden');
  document.getElementById('obj-empty').style.display = '';
});

function updateControls(e) {
  selectedObj = e.selected?.[0] ?? canvas.getActiveObject();
  if (!selectedObj || selectedObj._isBackground) return;
  document.getElementById('obj-controls').classList.remove('hidden');
  document.getElementById('obj-empty').style.display = 'none';

  const sv = Math.round(Math.max(selectedObj.scaleX, selectedObj.scaleY) * 100);
  const rv = Math.round(selectedObj.angle || 0);
  const ov = Math.round((selectedObj.opacity ?? 1) * 100);

  ['sl-scale','sl-rotate','sl-opacity'].forEach((id, i) => {
    setSlider(id, id.replace('sl-','val-'), [sv,rv,ov][i], ['%','°','%'][i]);
    setSlider(id+'-m', id.replace('sl-','val-')+'-m', [sv,rv,ov][i], ['%','°','%'][i]);
  });
}

function setSlider(sId, vId, val, unit) {
  const s = document.getElementById(sId), v = document.getElementById(vId);
  if (s) s.value = val;
  if (v) v.textContent = val + unit;
}

function bindSlider(sId, vId, unit, applyFn) {
  const sl = document.getElementById(sId);
  const vl = document.getElementById(vId);
  if (!sl) return;
  sl.addEventListener('input', () => {
    vl.textContent = sl.value + unit;
    if (selectedObj) { applyFn(selectedObj, Number(sl.value)); canvas.renderAll(); }
  });
}

// 데스크탑
bindSlider('sl-scale',   'val-scale',   '%', (o,v) => { o.set({scaleX:v/100,scaleY:v/100}); syncSlider('sl-scale-m','val-scale-m',v,'%'); });
bindSlider('sl-rotate',  'val-rotate',  '°', (o,v) => { o.set({angle:v});                    syncSlider('sl-rotate-m','val-rotate-m',v,'°'); });
bindSlider('sl-opacity', 'val-opacity', '%', (o,v) => { o.set({opacity:v/100});              syncSlider('sl-opacity-m','val-opacity-m',v,'%'); });
// 모바일
bindSlider('sl-scale-m',   'val-scale-m',   '%', (o,v) => { o.set({scaleX:v/100,scaleY:v/100}); syncSlider('sl-scale','val-scale',v,'%'); });
bindSlider('sl-rotate-m',  'val-rotate-m',  '°', (o,v) => { o.set({angle:v});                    syncSlider('sl-rotate','val-rotate',v,'°'); });
bindSlider('sl-opacity-m', 'val-opacity-m', '%', (o,v) => { o.set({opacity:v/100});              syncSlider('sl-opacity','val-opacity',v,'%'); });

function syncSlider(id, vId, val, unit) {
  const el = document.getElementById(id), vl = document.getElementById(vId);
  if (el) el.value = val;
  if (vl) vl.textContent = val + unit;
}

function bindBtn(id, fn) { const el = document.getElementById(id); if (el) el.addEventListener('click', fn); }

const flipH      = () => { if (selectedObj) { selectedObj.set('flipX', !selectedObj.flipX); canvas.renderAll(); }};
const flipV      = () => { if (selectedObj) { selectedObj.set('flipY', !selectedObj.flipY); canvas.renderAll(); }};
const bringFront = () => { if (selectedObj) { canvas.bringToFront(selectedObj); canvas.renderAll(); }};
const sendBack   = () => { if (selectedObj) { canvas.sendBackwards(selectedObj); canvas.renderAll(); }};
const deleteObj  = () => { if (selectedObj) { canvas.remove(selectedObj); selectedObj = null; canvas.renderAll(); }};

bindBtn('btn-flip-h',flipH);      bindBtn('btn-flip-h-m',flipH);
bindBtn('btn-flip-v',flipV);      bindBtn('btn-flip-v-m',flipV);
bindBtn('btn-bring-front',bringFront); bindBtn('btn-bring-front-m',bringFront);
bindBtn('btn-send-back',sendBack); bindBtn('btn-send-back-m',sendBack);
bindBtn('btn-delete',deleteObj);   bindBtn('btn-delete-m',deleteObj);

document.addEventListener('keydown', e => {
  if ((e.key==='Delete'||e.key==='Backspace') && selectedObj && !e.target.matches('input')) deleteObj();
});

// ══════════════════════════════════════════════
//  DOWNLOAD — 원본 해상도로 저장
// ══════════════════════════════════════════════
function download() {
  canvas.discardActiveObject();
  canvas.renderAll();
  const dataURL = canvas.toDataURL({ format: 'png', multiplier: 1 / displayScale });
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = 'olzzal-edit.png';
  a.click();
  showToast('저장 완료! 🎉');
}
document.getElementById('btn-download').addEventListener('click', download);
document.getElementById('mb-download').addEventListener('click', download);

// ══════════════════════════════════════════════
//  MOBILE SHEETS
// ══════════════════════════════════════════════
const stickerSheet = document.getElementById('mobile-sticker-sheet');
const editSheet    = document.getElementById('mobile-edit-sheet');

function openSheet(sheet) {
  closeMobileSheets();
  sheet.style.display = 'flex';
  requestAnimationFrame(() => sheet.classList.add('open'));
}
function closeMobileSheets() {
  [stickerSheet, editSheet].forEach(s => {
    s.classList.remove('open');
    setTimeout(() => { if (!s.classList.contains('open')) s.style.display = 'none'; }, 300);
  });
}

document.getElementById('mb-upload').addEventListener('click', () => { closeMobileSheets(); fileInput.click(); });
document.getElementById('mb-stickers').addEventListener('click', () => openSheet(stickerSheet));
document.getElementById('mb-edit').addEventListener('click', () => {
  if (!selectedObj) { showToast('먼저 만능대가리를 선택해주세요'); return; }
  openSheet(editSheet);
});
document.getElementById('sheet-handle').addEventListener('click', closeMobileSheets);
document.getElementById('edit-sheet-handle').addEventListener('click', closeMobileSheets);

document.addEventListener('click', e => {
  if (!stickerSheet.contains(e.target) && !e.target.closest('#mb-stickers')) stickerSheet.classList.remove('open');
  if (!editSheet.contains(e.target) && !e.target.closest('#mb-edit')) editSheet.classList.remove('open');
});

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
applyDisplayScale();
loadManifest();
</script>
